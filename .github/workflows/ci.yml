name: 🛰️ TerraVision AI — CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Force all actions to Node.js 24 — eliminates deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHON_VERSION:      "3.11"
  TERRAVISION_API_KEY: "ci-test-key-abc123"
  TERRAVISION_ENV:     "development"

jobs:

  # ── 1. Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint (black + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linters
        run: pip install black ruff

      - name: black — format check
        run: |
          black --check --line-length 90 \
            terravision/core.py \
            api.py \
            app.py \
            tests/

      - name: ruff — lint check
        run: |
          ruff check \
            terravision/core.py \
            api.py \
            app.py \
            tests/

  # ── 2. Tests + Coverage ──────────────────────────────────────────────────────
  test:
    name: Tests (pytest + coverage)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-mock

      - name: Run tests with coverage
        env:
          TERRAVISION_API_KEY: ${{ env.TERRAVISION_API_KEY }}
          TERRAVISION_ENV:     ${{ env.TERRAVISION_ENV }}
        run: |
          pytest tests/ \
            --cov=terravision \
            --cov=api \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false

  # ── 3. Security ──────────────────────────────────────────────────────────────
  security:
    name: Security (pip-audit)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install pip-audit
      - run: pip-audit -r requirements.txt --skip-editable || true

  # ── 4. Docker ────────────────────────────────────────────────────────────────
  docker:
    name: Docker build validation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build --target runtime --tag terravision-ai:ci .
      - name: Verify import
        run: |
          docker run --rm \
            -e TERRAVISION_API_KEY=ci-key \
            -e TERRAVISION_ENV=development \
            terravision-ai:ci \
            python -c "from terravision.core import TerraVisionTransformerV2; print('✅ V2 OK')"