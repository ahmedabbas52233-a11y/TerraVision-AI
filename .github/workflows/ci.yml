name: 🛰️ TerraVision AI — CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  TERRAVISION_API_KEY: "ci-test-key-abc123"
  TERRAVISION_ENV: "development"

jobs:

  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (black + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linters
        run: pip install black ruff

      - name: black — format check
        run: black --check --line-length 90 core.py api.py app.py train.py

      - name: ruff — lint check
        run: ruff check core.py api.py app.py train.py


  # ── 2. Unit + Integration Tests ──────────────────────────────────────────────
  test:
    name: Tests (pytest + coverage)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test suite with coverage
        env:
          TERRAVISION_API_KEY: ${{ env.TERRAVISION_API_KEY }}
          TERRAVISION_ENV: ${{ env.TERRAVISION_ENV }}
        run: |
          pytest tests/ \
            --cov=core \
            --cov=api \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 7


  # ── 3. Security scan ─────────────────────────────────────────────────────────
  security:
    name: Security (pip-audit)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies for known CVEs
        run: pip-audit -r requirements.txt --skip-editable || true


  # ── 4. Docker Build ──────────────────────────────────────────────────────────
  docker:
    name: Docker build validation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (runtime stage)
        run: |
          docker build \
            --target runtime \
            --tag terravision-ai:ci-${{ github.sha }} \
            .

      - name: Verify image — list files
        run: |
          docker run --rm terravision-ai:ci-${{ github.sha }} \
            ls -lh /app/

      - name: Verify image — Python import
        run: |
          docker run --rm \
            -e TERRAVISION_API_KEY=ci-key \
            -e TERRAVISION_ENV=development \
            terravision-ai:ci-${{ github.sha }} \
            python -c "from core import TerraVisionTransformer; print('✅ Import OK')"
